spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  test:
    database:
      replace: none

supabase:
  jwt:
    issuer-uri: http://localhost:54321/auth/v1
    jwk-set-uri: http://localhost:54321/auth/v1/jwks
    audience: authenticated
